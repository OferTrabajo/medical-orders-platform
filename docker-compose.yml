services:
  mysql:
    image: mysql:8.0
    container_name: medical_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: medical_orders
      MYSQL_USER: medical_user
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_PASSWORD: root123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - medical_network

  redis:
    image: redis:7-alpine
    container_name: medical_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medical_network

  laravel-app:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    container_name: medical_laravel
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./laravel-app:/var/www
    env_file:
      - ./laravel-app/.env
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    networks:
      - medical_network

  laravel-worker:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    container_name: medical_worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./laravel-app:/var/www
    env_file:
      - ./laravel-app/.env
    command: sh -c "php artisan config:clear && php artisan queue:work"
    depends_on:
      - laravel-app
      - redis
      - mysql
    networks:
      - medical_network

  nest-validator:
    build:
      context: .
      dockerfile: docker/nest/Dockerfile
    container_name: medical_nest
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./nest-validator:/app
      - /app/node_modules
    env_file:
      - ./nest-validator/.env
    ports:
      - "3000:3000"
    networks:
      - medical_network
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: medical_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - laravel-app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    stdin_open: true
    tty: true
    networks:
      - medical_network
volumes:
  mysql_data:

networks:
  medical_network:
    driver: bridge
